<header class="navbar" [class.is-scrolled]="scrolled()">
  <div class="navbar-inner container">
    <a class="brand" href="#home" (click)="$event.preventDefault(); navigate('home')" aria-label="Go to top">
      <span class="brand-mark neu-flat">{{ initials(personal.name) }}</span>
      <span class="brand-text">
        <span class="brand-name">{{ personal.name }}</span>
        <span class="brand-role">{{ personal.title }}</span>
      </span>
    </a>

    <nav class="nav-links" aria-label="Primary">
      @for (link of links; track link.id) {
        <a
          href="#{{ link.id }}"
          class="nav-link"
          [class.is-active]="activeSection() === link.id"
          (click)="$event.preventDefault(); navigate(link.id)"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <button
      type="button"
      class="menu-toggle neu-flat"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="mobile-menu"
      aria-label="Toggle navigation menu"
    >
      @if (!menuOpen()) {
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M2 4.5H16M2 9H16M2 13.5H16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </svg>
      } @else {
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M3.5 3.5L14.5 14.5M14.5 3.5L3.5 14.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
        </svg>
      }
    </button>
  </div>

  <nav id="mobile-menu" class="mobile-menu" [class.is-open]="menuOpen()" aria-label="Mobile">
    @for (link of links; track link.id) {
      <a
        href="#{{ link.id }}"
        class="mobile-link"
        [class.is-active]="activeSection() === link.id"
        (click)="$event.preventDefault(); navigate(link.id)"
      >
        {{ link.label }}
      </a>
    }
  </nav>
</header>
